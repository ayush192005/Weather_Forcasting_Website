<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="frame2.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-1">
                <aside class="Side_Bar">

                    <div class="logo">
                        <img src="logo.png">
                    </div>

                    <div class="Brand_name">
                        <p>SKYNOW</p>
                    </div>

                    <button class="btn1"><i class="ri-bar-chart-box-line"></i></button>
                    <button class="btn1"><i class="ri-line-chart-line"></i></button>
                    <button class="btn1"><i class="bi bi-geo-alt"></i></button>
                    <button class="btn1"><i class="ri-calendar-line"></i></button>

                    <div class="Side_Bar_Bottom_buttons">
                        <button class="btn1"><i class="ri-sidebar-unfold-line"></i></button>
                    </div>

                </aside>
            </div>

            <!-- Main Content -->
            <div class="col-10  ">

                <main class="main_content ">

                    <div class="header d-flex align-items-center">

                        <div class="avtar">
                            <img src="user_logo.png">
                        </div>

                        <div class="greeting ">
                            <p id="greet">Hello,</p>
                            <p id="name">Ayush Bansal</p>
                        </div>

                        <nav class="ms-auto navbar bg-body-tertiary">
                            <div class="container-fluid justify-content-end">
                                <form class="d-flex" role="search">
                                    <input class="form-control me-2" type="search" placeholder="Search anything..."
                                        aria-label="Search" />
                                    <button class="btn"><i class="ri-notification-line"></i></button>
                                </form>
                            </div>
                        </nav>

                    </div>

                </main>

            </div>

        </div>
    </div>

</body>

</html>
