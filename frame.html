<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="frame2.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
    <div class="container">

        <!--TODO:  _____ SIDEBAR _____ -->
        <aside class="side_bar">
            <div class="logo">
                <i class="bi bi-tornado"></i>
                <span>SKYNOW</span>
            </div>
            <div class="brand_name">

            </div>

            <div class="menu_buttons">
                <button class="btn1"><i class="ri-bar-chart-box-line"></i></button>
                <button class="btn1"><i class="ri-line-chart-line"></i></button>
                <button class="btn1"><i class="bi bi-geo-alt"></i></button>
                <button class="btn1"><i class="ri-calendar-line"></i></button>

            </div>

            <div class="bottom_icon">
                <button class="btn1"><i class="ri-contrast-2-fill"></i></i></button>
            </div>

        </aside>

        <!--TODO:  _____ Header Section _____ -->
        <main class="main_content">
            <header class="header_section">
                <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
                <div class="status_bar">
                    <img src="user_logo.png" alt="logo" width="70" height="70">
                </div>

                <div class="greet">
                    <span>Hello,</span><br>
                    <span id="name">Ayush</span>
                </div>

                <div class="search_section">
                    <div class="input_section">
                        <input type="text" placeholder="Search anything...">
                    </div>

                    <div class="search_icon">
                        <i class="bi bi-search search_i"></i>
                    </div>

                </div>

                <div class="bell_button">
                    <button><i class="bi bi-bell"></i></button>
                </div>

            </header>

            <div class="card_holder">
                <div class="card1">

                </div>

                <div class="card1">

                </div>
            </div>

            <div class="graph_section">
                <div class="card3">

                </div>

                <div class="tomorrow_section">

                </div>
            </div>
        </main>


        <aside class="right_side_panel">

        </aside>
    </div>
</body>

</html>
