<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="frame2.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>

    <div class="container">

        <aside class="side_panel">

            <!-- Logo Section -->
            <div class="logo_section">
                <img src="logo.png" alt="logo" width="50" height="50">
                <span class="brand_name">SKYNOW</span>
            </div>

            <!-- Menu Buttons -->
            <div class="menu_buttons">
                <button class="btn1"><i class="ri-bar-chart-box-line"></i></button>
                <button class="btn1"><i class="ri-line-chart-line"></i></button>
                <button class="btn1"><i class="bi bi-geo-alt"></i></button>
                <button class="btn1"><i class="ri-calendar-line"></i></button>
            </div>

            <!-- Bottom Button -->
            <div class="sidebar_bottom">
                <button class="btn1"><i class="ri-sidebar-unfold-line"></i></button>
            </div>

        </aside>

    </div>

</body>

</html>
