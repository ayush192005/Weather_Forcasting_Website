<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="frame.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>
    <div class="container">

        <aside class="side_bar">
            <div class="logo">
                <i class="bi bi-tornado"></i>
            </div>
            <div class="brand_name">
                <span>SKYNOW</span>
            </div>

            <div class="menu_buttons">
                <button class="btn1"><i class="ri-bar-chart-box-line"></i></button>
                <button class="btn1"><i class="ri-line-chart-line"></i></button>
                <button class="btn1"><i class="bi bi-geo-alt"></i></button>
                <button class="btn1"><i class="ri-calendar-line"></i></button>
                <button id="bottom_icon"><i class="bi bi-layout-sidebar "></i></button>
            </div>

        </aside>

        <header class="header_section">
            <div class="status_bar">
                <img src="user_logo.png" alt="logo" width="50px" height="50px">
            </div>

            <div class="greet">
                <span>Hello,</span><br>
                <span>Ayush Bansal</span>
            </div>

            <div class="search_section">
                <div class="input_section">
                    <input type="text" placeholder="Search anything...">
                </div>

                <div class="bell_button">
                    <button id="bell"><i class="bi bi-bell"></i></button>
                </div>

            </div>

        </header>

        <main>

        </main>
    </div>
</body>

</html>
